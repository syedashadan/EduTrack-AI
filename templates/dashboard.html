<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />

    <title>EduTrack AI Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>

  <body class="bg-light">
    <nav class="navbar navbar-dark bg-primary">
      <div class="container">
        <h3 class="text-white">EduTrack AI</h3>

        <div>
          <span class="text-white me-3">
            Welcome {{ current_user.username }}
          </span>

          <a href="{{ url_for('logout') }}" class="btn btn-danger"> Logout </a>
        </div>
      </div>
    </nav>

    <div class="container mt-5">
      <h2 class="mb-4">Dashboard</h2>

      <div class="row">
        <div class="col-md-4">
          <div class="card text-white bg-primary shadow mb-3">
            <div class="card-body text-center">
              <h5>Total Students</h5>
              <h1>{{ total_students }}</h1>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card text-white bg-success shadow mb-3">
            <div class="card-body text-center">
              <h5>Add New Student</h5>

              <a href="{{ url_for('add_student') }}" class="btn btn-light">
                Add Student
              </a>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card text-white bg-dark shadow mb-3">
            <div class="card-body text-center">
              <h5>Student Records</h5>

              <a href="{{ url_for('view_students') }}" class="btn btn-light">
                View Students
              </a>
            </div>
          </div>
        </div>
      </div>

      <hr />

      <div class="row">
        <div class="col-md-4">
          <div class="card border-primary shadow">
            <div class="card-body text-center">
              <h5>👨 Male Students</h5>
              <h2>{{ male_students }}</h2>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card border-danger shadow">
            <div class="card-body text-center">
              <h5>👩 Female Students</h5>
              <h2>{{ female_students }}</h2>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card border-success shadow">
            <div class="card-body text-center">
              <h5>🏫 Departments</h5>
              <h2>{{ departments }}</h2>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="container mt-5">
      <div class="card shadow">
        <div class="card-header bg-dark text-white">Student Statistics</div>

        <div class="card-body">
          <canvas id="studentChart"></canvas>
        </div>
      </div>
    </div>

    <script>

      const ctx = document.getElementById('studentChart');

      new Chart(ctx, {
          type: 'pie',
          data: {
              labels: [
                  {% for dept, count in department_data %}
                      "{{ dept }}",
                  {% endfor %}
              ],
              datasets: [{
                  label: 'Students by Department',
                  data: [
                      {% for dept, count in department_data %}
                          {{ count }},
                      {% endfor %}
                  ]
              }]
          }
      });
    </script>
  </body>
</html>
